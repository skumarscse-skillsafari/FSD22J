<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Description" content="CSS - Transition - Intro">
    <title>CSS - Transition - Intro</title>
    <style>
        /* 
        CSS - Transition - Intro
        */
        div {
            height: 150px;
            width: 150px;
            background: crimson;
            transition: background 3s;
        }

        div:hover {
            background: coral;
        }
    </style>
</head>

<body>
    <h1>CSS - Transition - Intro</h1>
    <div class="transition"></div>
</body>

</html>
